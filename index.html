<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GBeauty Inventory Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <h1>GBeauty Inventory Tracker</h1>
    <p>An inventory tracker for GBeauty beauty supply store.</p>
  </header>

  <main>
    <section class="card">
      <h2>Add a Product</h2>

      <form id="product-form">
        <label for="product-name">Product Name</label>
        <input type="text" id="product-name" placeholder="Example: Edge Control" required>

        <label for="product-category">Category</label>
        <input type="text" id="product-category" placeholder="Example: Hair Care" required>

        <label for="product-quantity">Quantity</label>
        <input type="number" id="product-quantity" min="1" required>

        <label for="product-price">Price</label>
        <input type="number" id="product-price" min="0" step="0.01" required>

        <button type="submit">Add Product</button>
      </form>
    </section>

    <section class="card">
      <h2>Inventory Summary</h2>

      <div class="summary-grid">
        <article>
          <h3>Total Products</h3>
          <p id="total-products">0</p>
        </article>

        <article>
          <h3>Total Items</h3>
          <p id="total-items">0</p>
        </article>

        <article>
          <h3>Total Value</h3>
          <p id="total-value">$0.00</p>
        </article>
      </div>
    </section>

    <section class="card">
      <h2>Current Inventory</h2>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Product</th>
              <th>Category</th>
              <th>Quantity</th>
              <th>Price</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="inventory-body">
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
